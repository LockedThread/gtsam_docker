name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version Number (semver tag, e.g. v4.0.0)"
        required: true
  workflow_call:
    inputs:
      version:
        description: "Version Number (semver tag, e.g. v4.0.0)"
        required: true
        type: string

jobs:
  build-full-matrix:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-full-matrix.yaml
    with:
      release_version: ${{ inputs.version }}
    secrets: inherit

  release:
    needs: build-full-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: ${{ inputs.version }}
          prerelease: false
          title: ${{ inputs.version }}

  changelog-pr:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Create release branch
        run: git checkout -b release/${{ inputs.version }}

      - name: Init git config
        run: |
          git config user.name "GitHub Actions"
          git config user.email noreply@github.com

      - name: Update Changelog
        uses: thomaseizinger/keep-a-changelog-new-release@v3
        with:
          version: ${{ inputs.version }}

      - name: Commit changelog
        id: make-commit
        run: |
          git add CHANGELOG.md
          git commit --message "Prepare release ${{ inputs.version }}"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push commit
        run: git push origin release/${{ inputs.version }}

      - name: Create pull request into main
        uses: thomaseizinger/create-pull-request@1.4.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          head: release/${{ inputs.version }}
          base: main
          title: ${{ inputs.version }} into main
          body: |
            This PR was created by the Release workflow.
            Changelog commit: ${{ steps.make-commit.outputs.commit }}.

      - name: Create pull request into development
        uses: thomaseizinger/create-pull-request@1.4.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          head: release/${{ inputs.version }}
          base: development
          title: ${{ inputs.version }} into development
          body: |
            This PR was created by the Release workflow.
            Changelog commit: ${{ steps.make-commit.outputs.commit }}.
