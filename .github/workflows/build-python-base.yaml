name: Build Python Base Images

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Optional single Python minor version to build, e.g. 3.14"
        required: false
        default: ""
  push:
    paths:
      - "Dockerfile.python-base"
      - ".github/workflows/build-python-base.yaml"
    branches:
      - main
      - development

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.11", "3.12", "3.13", "3.14"]
        platform:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
        base:
          - image: python-build
            target: python-build-glibc
            suffix: glibc-trixie
          - image: python-runtime
            target: python-runtime-glibc-trixie
            suffix: glibc-trixie
          - image: python-runtime
            target: python-runtime-glibc-slim
            suffix: glibc-trixie-slim
          - image: python-build
            target: python-build-musl
            suffix: musl-alpine
          - image: python-runtime
            target: python-runtime-musl-alpine
            suffix: musl-alpine
    if: ${{ inputs.python_version == '' || inputs.python_version == matrix.python_version }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=${REGISTRY}/${repo}/${{ matrix.base.image }}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.base.image }} (${{ matrix.python_version }}, ${{ matrix.base.suffix }}, ${{ matrix.platform.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.python-base
          target: ${{ matrix.base.target }}
          push: true
          provenance: false
          platforms: ${{ matrix.platform.platform }}
          tags: ${{ steps.image.outputs.name }}:py${{ matrix.python_version }}-${{ matrix.base.suffix }}-${{ matrix.platform.arch }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.11", "3.12", "3.13", "3.14"]
        base:
          - image: python-build
            suffix: glibc-trixie
          - image: python-runtime
            suffix: glibc-trixie
          - image: python-runtime
            suffix: glibc-trixie-slim
          - image: python-build
            suffix: musl-alpine
          - image: python-runtime
            suffix: musl-alpine
    if: ${{ inputs.python_version == '' || inputs.python_version == matrix.python_version }}
    steps:
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          image="${REGISTRY}/${repo}/${{ matrix.base.image }}"
          tag="py${{ matrix.python_version }}-${{ matrix.base.suffix }}"
          docker manifest create "$image:$tag" \
            "$image:$tag-amd64" \
            "$image:$tag-arm64"
          docker manifest push "$image:$tag"
