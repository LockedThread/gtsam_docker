name: Build Python Base Images

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Optional single Python minor version to build, e.g. 3.14"
        required: false
        default: ""
  push:
    paths:
      - "Dockerfile.python-base"
      - ".github/workflows/build-python-base.yaml"
    branches:
      - main
      - development

env:
  REGISTRY: ghcr.io

jobs:
  # The matrix cannot be filtered with a job-level `if` because the `matrix`
  # context is not available there. Instead we compute the Python-version list
  # up front (one entry when workflow_dispatch passes python_version, otherwise
  # the full set) and feed it into the build/manifest matrices via fromJSON.
  setup:
    runs-on: ubuntu-latest
    outputs:
      py_versions: ${{ steps.set.outputs.py_versions }}
    steps:
      - id: set
        run: |
          if [ -n "${{ inputs.python_version }}" ]; then
            printf 'py_versions=["%s"]\n' "${{ inputs.python_version }}" >> "$GITHUB_OUTPUT"
          else
            echo 'py_versions=["3.11","3.12","3.13","3.14"]' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        python_version: ${{ fromJSON(needs.setup.outputs.py_versions) }}
        platform:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
        base:
          - image: python-build
            target: python-build-glibc
            suffix: glibc-trixie
          - image: python-runtime
            target: python-runtime-glibc-trixie
            suffix: glibc-trixie
          - image: python-runtime
            target: python-runtime-glibc-slim
            suffix: glibc-trixie-slim
          - image: python-build
            target: python-build-musl
            suffix: musl-alpine
          - image: python-runtime
            target: python-runtime-musl-alpine
            suffix: musl-alpine
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "name=${REGISTRY}/${repo}/${{ matrix.base.image }}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.base.image }} (${{ matrix.python_version }}, ${{ matrix.base.suffix }}, ${{ matrix.platform.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.python-base
          target: ${{ matrix.base.target }}
          push: true
          provenance: mode=max
          sbom: true
          platforms: ${{ matrix.platform.platform }}
          tags: ${{ steps.image.outputs.name }}:py${{ matrix.python_version }}-${{ matrix.base.suffix }}-${{ matrix.platform.arch }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}

  manifest:
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        python_version: ${{ fromJSON(needs.setup.outputs.py_versions) }}
        base:
          - image: python-build
            suffix: glibc-trixie
          - image: python-runtime
            suffix: glibc-trixie
          - image: python-runtime
            suffix: glibc-trixie-slim
          - image: python-build
            suffix: musl-alpine
          - image: python-runtime
            suffix: musl-alpine
    steps:
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # imagetools create (unlike docker manifest create) preserves the per-arch
      # SBOM/provenance attestation manifests when assembling the multi-arch index.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          image="${REGISTRY}/${repo}/${{ matrix.base.image }}"
          tag="py${{ matrix.python_version }}-${{ matrix.base.suffix }}"
          docker buildx imagetools create -t "$image:$tag" \
            "$image:$tag-amd64" \
            "$image:$tag-arm64"
