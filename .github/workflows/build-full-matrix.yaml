name: Build Full Image Matrix

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional release tag prefix, e.g. v4.0.0"
        required: false
        default: ""
  workflow_call:
    inputs:
      release_version:
        description: "Optional release tag prefix, e.g. v4.0.0"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "21 8 * * 1"

# Deny all GITHUB_TOKEN scopes by default; jobs opt into the minimum they need.
permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.11", "3.12", "3.13", "3.14"]
        gtsam_version: ["4.2.0", "4.2.1", "4.3a1"]
        platform:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
        runtime:
          - base: trixie
            target: runtime-trixie
            python_build_target: python-build-glibc
            python_runtime_target: python-runtime-glibc-trixie
            build_suffix: glibc-trixie
            runtime_suffix: glibc-trixie
            artifact_suffix: glibc-trixie
            experimental: false
          - base: trixie-slim
            target: runtime-trixie-slim
            python_build_target: python-build-glibc
            python_runtime_target: python-runtime-glibc-slim
            build_suffix: glibc-trixie
            runtime_suffix: glibc-trixie-slim
            artifact_suffix: glibc-trixie
            experimental: false
          - base: distroless-debian13
            target: runtime-distroless
            python_build_target: python-build-glibc
            python_runtime_target: python-runtime-glibc-slim
            build_suffix: glibc-trixie
            runtime_suffix: glibc-trixie-slim
            artifact_suffix: glibc-trixie
            experimental: false
          - base: alpine
            target: runtime-alpine
            python_build_target: python-build-musl
            python_runtime_target: python-runtime-musl-alpine
            build_suffix: musl-alpine
            runtime_suffix: musl-alpine
            artifact_suffix: musl-alpine
            experimental: true
    runs-on: ${{ matrix.platform.runner }}
    continue-on-error: ${{ matrix.runtime.experimental || (matrix.gtsam_version != '4.3a1' && (matrix.python_version == '3.13' || matrix.python_version == '3.14')) }}
    permissions:
      contents: read
      packages: write
    # SBOM/provenance attestations require the docker-container buildx driver,
    # which cannot read images from the local Docker daemon. The freshly built
    # Python bases are therefore pushed to a throwaway in-job registry that the
    # container builder pulls from via the host network.
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."localhost:5000"]
              http = true

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image names
        id: image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "repo=${REGISTRY}/${repo}" >> "$GITHUB_OUTPUT"
          echo "python_build=${REGISTRY}/${repo}/python-build" >> "$GITHUB_OUTPUT"
          echo "python_runtime=${REGISTRY}/${repo}/python-runtime" >> "$GITHUB_OUTPUT"
          echo "gtsam_build=${REGISTRY}/${repo}/gtsam-build" >> "$GITHUB_OUTPUT"

      - name: Build local Python build base
        run: |
          docker buildx build \
            --platform ${{ matrix.platform.platform }} \
            -f Dockerfile.python-base \
            --target ${{ matrix.runtime.python_build_target }} \
            --build-arg PYTHON_VERSION=${{ matrix.python_version }} \
            --provenance=false \
            -t localhost:5000/python-build:py${{ matrix.python_version }}-${{ matrix.runtime.build_suffix }} \
            --push .

      - name: Build local Python runtime base
        run: |
          docker buildx build \
            --platform ${{ matrix.platform.platform }} \
            -f Dockerfile.python-base \
            --target ${{ matrix.runtime.python_runtime_target }} \
            --build-arg PYTHON_VERSION=${{ matrix.python_version }} \
            --provenance=false \
            -t localhost:5000/python-runtime:py${{ matrix.python_version }}-${{ matrix.runtime.runtime_suffix }} \
            --push .

      - name: Publish GTSAM build artifact image
        if: ${{ matrix.runtime.base == 'trixie-slim' || matrix.runtime.base == 'alpine' }}
        run: |
          set -euo pipefail
          artifact_tag="gtsam${{ matrix.gtsam_version }}-py${{ matrix.python_version }}-${{ matrix.runtime.artifact_suffix }}-${{ matrix.platform.arch }}"
          docker buildx build \
            --platform ${{ matrix.platform.platform }} \
            --target gtsam-build \
            --sbom=true \
            --provenance=mode=max \
            --build-arg PYTHON_VERSION=${{ matrix.python_version }} \
            --build-arg PYTHON_ABI=${{ matrix.python_version }} \
            --build-arg GTSAM_VERSION=${{ matrix.gtsam_version }} \
            --build-arg PYTHON_BUILD_IMAGE=localhost:5000/python-build:py${{ matrix.python_version }}-${{ matrix.runtime.build_suffix }} \
            --push \
            -t "${{ steps.image.outputs.gtsam_build }}:${artifact_tag}" \
            .

      - name: Build and push runtime image
        run: |
          set -euo pipefail
          base_tag="gtsam${{ matrix.gtsam_version }}-py${{ matrix.python_version }}-${{ matrix.runtime.base }}"
          arch_tag="${base_tag}-${{ matrix.platform.arch }}"
          tags=("-t" "${{ steps.image.outputs.repo }}:${arch_tag}")
          release_version="${{ inputs.release_version }}"
          if [ -n "$release_version" ]; then
            tags+=("-t" "${{ steps.image.outputs.repo }}:${release_version}-${arch_tag}")
          fi
          if [ "${{ matrix.gtsam_version }}" = "4.3a1" ] && [ "${{ matrix.python_version }}" = "3.14" ] && [ "${{ matrix.runtime.base }}" = "trixie-slim" ]; then
            tags+=("-t" "${{ steps.image.outputs.repo }}:latest-${{ matrix.platform.arch }}")
          fi
          docker buildx build \
            --platform ${{ matrix.platform.platform }} \
            --target ${{ matrix.runtime.target }} \
            --sbom=true \
            --provenance=mode=max \
            --build-arg PYTHON_VERSION=${{ matrix.python_version }} \
            --build-arg PYTHON_ABI=${{ matrix.python_version }} \
            --build-arg GTSAM_VERSION=${{ matrix.gtsam_version }} \
            --build-arg PYTHON_BUILD_IMAGE=localhost:5000/python-build:py${{ matrix.python_version }}-${{ matrix.runtime.build_suffix }} \
            --build-arg PYTHON_RUNTIME_IMAGE=localhost:5000/python-runtime:py${{ matrix.python_version }}-${{ matrix.runtime.runtime_suffix }} \
            --build-arg PYTHON_RUNTIME_TRIXIE_IMAGE=localhost:5000/python-runtime:py${{ matrix.python_version }}-${{ matrix.runtime.runtime_suffix }} \
            --build-arg PYTHON_RUNTIME_SLIM_IMAGE=localhost:5000/python-runtime:py${{ matrix.python_version }}-${{ matrix.runtime.runtime_suffix }} \
            --build-arg PYTHON_RUNTIME_ALPINE_IMAGE=localhost:5000/python-runtime:py${{ matrix.python_version }}-${{ matrix.runtime.runtime_suffix }} \
            --push \
            "${tags[@]}" \
            .

      - name: Pull runtime image for validation
        run: |
          docker pull "${{ steps.image.outputs.repo }}:gtsam${{ matrix.gtsam_version }}-py${{ matrix.python_version }}-${{ matrix.runtime.base }}-${{ matrix.platform.arch }}"
          docker tag "${{ steps.image.outputs.repo }}:gtsam${{ matrix.gtsam_version }}-py${{ matrix.python_version }}-${{ matrix.runtime.base }}-${{ matrix.platform.arch }}" gtsam_docker:validate

      - name: Validate minimal GTSAM import
        run: ./scripts/validate_container.sh gtsam_docker:validate /examples/validate_gtsam.py

      - name: Validate NumPy ABI
        run: ./scripts/validate_container.sh gtsam_docker:validate /examples/validate_numpy_abi.py

      - name: Validate PlanarSLAM
        run: ./scripts/validate_container.sh gtsam_docker:validate /examples/PlanarSLAMExample.py

      - name: Report image size
        run: ./scripts/size-report.sh gtsam_docker:validate gtsam${{ matrix.gtsam_version }}-py${{ matrix.python_version }}-${{ matrix.runtime.base }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifests for published images
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          image="${REGISTRY}/${repo}"
          gtsam_build="${REGISTRY}/${repo}/gtsam-build"
          release_version="${{ inputs.release_version }}"

          # imagetools create assembles the multi-arch index while carrying over
          # each arch's SBOM/provenance attestation manifests (docker manifest
          # create would drop them).
          create_manifest() {
            local image_name="$1"
            local tag="$2"
            local amd64_tag="${tag}-amd64"
            local arm64_tag="${tag}-arm64"
            if docker buildx imagetools inspect "$image_name:$amd64_tag" >/dev/null 2>&1 && docker buildx imagetools inspect "$image_name:$arm64_tag" >/dev/null 2>&1; then
              docker buildx imagetools create -t "$image_name:$tag" "$image_name:$amd64_tag" "$image_name:$arm64_tag"
            else
              echo "Skipping manifest $image_name:$tag because one or more arch tags are missing."
            fi
          }

          for py in 3.11 3.12 3.13 3.14; do
            for gtsam in 4.2.0 4.2.1 4.3a1; do
              for artifact in glibc-trixie musl-alpine; do
                create_manifest "$gtsam_build" "gtsam${gtsam}-py${py}-${artifact}"
              done
              for base in trixie trixie-slim distroless-debian13 alpine; do
                tag="gtsam${gtsam}-py${py}-${base}"
                create_manifest "$image" "$tag"
                if [ -n "$release_version" ]; then
                  create_manifest "$image" "${release_version}-${tag}"
                fi
              done
            done
          done

          create_manifest "$image" latest
